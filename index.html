<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASS | Village Weather Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .active-village { background-color: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.3); }
        .bg-dark { background-color: #0f172a; }
        .card-dark { background-color: #1e293b; border: 1px solid #334155; }
        .tab-btn { transition: all 0.3s ease; }
        canvas { max-height: 350px; }
    </style>
</head>
<body class="bg-dark text-slate-200 font-sans min-h-screen flex flex-col">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-blue-600 rounded-lg"><i data-lucide="user" class="text-white"></i></div>
                <h1 class="text-xl font-bold tracking-tight">CASS <span class="text-blue-400">DASHBOARD</span></h1>
            </div>
            
		<div class="flex flex-wrap justify-center gap-2" id="villageButtons">
			<!-- อำเภอ 0 -->
			<div class="relative">
				<button onclick="toggleDropdown(0)" 
					class="tab-btn active-village px-4 py-2 rounded-full border border-slate-700 text-sm font-medium">
					อำเภอเมืองสกลนคร ▼
				</button>
				<div id="dropdown-0" class="hidden absolute mt-2 bg-slate-800 rounded-xl shadow-lg p-2 space-y-1 z-50 min-w-[180px]"></div>
			</div>
			<!-- อำเภอ 1 -->
			<div class="relative">
				<button onclick="toggleDropdown(1)" 
					class="tab-btn px-4 py-2 rounded-full border border-slate-700 text-sm font-medium hover:border-slate-500">
					อำเภอโคกศรีสุพรรณ ▼
				</button>
				<div id="dropdown-1" class="hidden absolute mt-2 bg-slate-800 rounded-xl shadow-lg p-2 space-y-1 z-50 min-w-[180px]"></div>
			</div>
			<!-- อำเภอ 2 -->
			<div class="relative">
				<button onclick="toggleDropdown(2)" 
					class="tab-btn px-4 py-2 rounded-full border border-slate-700 text-sm font-medium hover:border-slate-500">
					อำเภอโพนนาแก้ว ▼
				</button>
				<div id="dropdown-2" class="hidden absolute mt-2 bg-slate-800 rounded-xl shadow-lg p-2 space-y-1 z-50 min-w-[180px]"></div>
			</div>
		</div>
        </div>
    </nav>

    <main class="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full">
        
	<div class="mb-8 border-l-4 border-blue-500 pl-6">
		
		<!-- 🏷️ ชื่อหมู่บ้าน -->
		<h2 id="currentVillageName"
			class="text-4xl font-black text-white italic tracking-tighter uppercase">
			บ้านโนนประดู่
		</h2>

		<!-- 📍 ที่ตั้ง -->
		<p id="locationText"
			class="text-slate-400 text-sm mt-2">
		</p>

		<!-- 🌍 พิกัด -->
		<p id="coordText"
		   class="text-slate-500 text-xs font-mono">
		</p>

		<!-- ⚙️ system -->
		<p class="text-slate-600 text-[10px] uppercase tracking-[0.2em] mt-2">
			Administered by:
			<span class="text-blue-400 font-bold">CASS</span>
		</p>

	</div>

		 <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 mb-8">

			<!-- 🌡️ Temperature -->
			<div onclick="setMetric('temp', this)" class="card-dark p-6 rounded-3xl cursor-pointer">
				<div class="flex justify-between items-start mb-4">
					<div class="p-3 bg-orange-500/10 rounded-2xl text-orange-500">
						<i data-lucide="thermometer"></i>
					</div>
					<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Temperature</span>
				</div>
				<div class="flex items-baseline gap-1">
					<span id="tempVal" class="text-4xl font-bold text-white">32</span>
					<span class="text-slate-400 text-lg">°C</span>
				</div>
				<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
					<div id="tempBar" class="h-full bg-orange-500" style="width: 70%"></div>
				</div>
			</div>

			<!-- 💧 Humidity -->
			<div onclick="setMetric('humid', this)" class="card-dark p-6 rounded-3xl cursor-pointer">
				<div class="flex justify-between items-start mb-4">
					<div class="p-3 bg-blue-500/10 rounded-2xl text-blue-500">
						<i data-lucide="droplets"></i>
					</div>
					<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Humidity</span>
				</div>
				<div class="flex items-baseline gap-1">
					<span id="humidVal" class="text-4xl font-bold text-white">65</span>
					<span class="text-slate-400 text-lg">%</span>
				</div>
				<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
					<div id="humidBar" class="h-full bg-blue-500" style="width: 65%"></div>
				</div>
			</div>

			<!-- 🌬️ Wind -->
			<div onclick="setMetric('wind', this)" class="card-dark p-6 rounded-3xl cursor-pointer">
				<div class="flex justify-between items-start mb-4">
					<div class="p-3 bg-indigo-500/10 rounded-2xl text-indigo-500">
						<i data-lucide="wind"></i>
					</div>
					<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Wind</span>
				</div>
				<div class="flex items-baseline gap-1">
					<span id="windVal" class="text-4xl font-bold text-white">12</span>
					<span class="text-slate-400 text-lg">m/s</span>
				</div>
				<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
					<div id="windBar" class="h-full bg-indigo-500" style="width: 30%"></div>
				</div>
			</div>

			<!-- 🌧️ Rain -->
			<div onclick="setMetric('rain', this)" class="card-dark p-6 rounded-3xl cursor-pointer">
				<div class="flex justify-between items-start mb-4">
					<div class="p-3 bg-emerald-500/10 rounded-2xl text-emerald-500">
						<i data-lucide="cloud-rain"></i>
					</div>
					<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Rain</span>
				</div>
				<div class="flex items-baseline gap-1">
					<span id="rainVal" class="text-4xl font-bold text-white">4.5</span>
					<span class="text-slate-400 text-lg">mm</span>
				</div>
				<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
					<div id="rainBar" class="h-full bg-emerald-500" style="width: 20%"></div>
				</div>
			</div>

			<!-- ☁️ Cloud -->
			<div onclick="setMetric('cloud', this)" class="card-dark p-6 rounded-3xl cursor-pointer">
				<div class="flex justify-between items-start mb-4">
					<div class="p-3 bg-gray-500/10 rounded-2xl text-gray-400">
						<i data-lucide="cloud"></i>
					</div>
					<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Cloud</span>
				</div>
				<div class="flex items-baseline gap-1">
					<span id="cloudVal" class="text-4xl font-bold text-white">60</span>
					<span class="text-slate-400 text-lg">%</span>
				</div>
				<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
					<div class="h-full bg-gray-400" style="width: 60%"></div>
				</div>
			</div>

			<!-- ☀️ Solar -->
			<div onclick="setMetric('solar', this)" class="card-dark p-6 rounded-3xl cursor-pointer">
				<div class="flex justify-between items-start mb-4">
					<div class="p-3 bg-yellow-500/10 rounded-2xl text-yellow-400">
						<i data-lucide="sun"></i>
					</div>
					<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Solar</span>
				</div>
				<div class="flex items-baseline gap-1">
					<span id="solarVal" class="text-4xl font-bold text-white">800</span>
					<span class="text-slate-400 text-lg">W/m²</span>
				</div>
				<div class="mt-4 h-1 w-full bg-slate-800 rounded-full overflow-hidden">
					<div class="h-full bg-yellow-400" style="width: 70%"></div>
				</div>
			</div>

		</div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 card-dark p-6 rounded-3xl shadow-2xl">
                <div class="flex items-center justify-between mb-6">
					<h3 id="chartTitle" class="font-bold text-lg flex items-center gap-2 text-white">
						<i data-lucide="line-chart" class="text-blue-400 w-5 h-5"></i>
						แนวโน้มสภาพอากาศ
					</h3>
                </div>
                <div class="flex gap-2 mb-4">
				  <button id="btn-hourly" onclick="setRange('hourly')" class="px-3 py-1 rounded">
					รายชั่วโมง
				</button>

				<button id="btn-daily" onclick="setRange('daily')" class="px-3 py-1 rounded">
					7 วัน
				</button>
				</div>
				
                <div class="w-full h-[300px]">
                    <canvas id="weatherChart"></canvas>
                </div>
            </div>

            <div class="space-y-6">
                <div class="card-dark p-6 rounded-3xl">
			<h3 class="font-bold text-xs mb-4 text-slate-400 uppercase tracking-widest">
				รายละเอียดตามช่วงเวลา
			</h3>
			<div id="timeBlocks" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
			</div>
          </div>
        </div>
    </main>

    <footer class="p-8 text-center text-slate-600 text-[10px] uppercase tracking-[0.3em]">
        Designed and Developed by CASS &copy; 2026
    </footer>

	<script>
		let currentDistrict = 0;
		let currentVillage = 0;
		let currentMetric = "temp";
		let currentRange = "hourly";

		const metricLabel = {
			temp: "อุณหภูมิ",
			humid: "ความชื้นสัมพัทธ์",
			wind: "ความเร็วลม",
			rain: "ปริมาณน้ำฝน",
			cloud: "ปริมาณเมฆ",
			solar: "รังสีดวงอาทิตย์"
		};

		const rangeLabel = {
			hourly: "รายชั่วโมง",
			daily: "7 วัน"
		};

		const metricUnit = {
			temp: "°C",
			humid: "%",
			wind: "m/s",
			rain: "มม.",
			cloud: " ",
			solar: "W/m²"
		};

		let villageData = [];

		lucide.createIcons();

		function toggleDropdown(index) {
			  const dropdown = document.getElementById(`dropdown-${index}`);

			  // ปิดตัวอื่นก่อน
			  document.querySelectorAll("[id^='dropdown-']").forEach(el => {
				if (el !== dropdown) el.classList.add("hidden");
			  });

			  // toggle ตัวที่กด
			  dropdown.classList.toggle("hidden");

			  // render หมู่บ้าน
			  renderDropdownVillages(index);
			}

		function renderDropdownVillages(districtIndex) {
			  const container = document.getElementById(`dropdown-${districtIndex}`);
			  container.innerHTML = "";

			  villageData[districtIndex].villages.forEach((village, i) => {
				const btn = document.createElement("button");

				btn.innerText = village.name;
				btn.className = "block w-full text-left px-3 py-2 rounded hover:bg-blue-500/20";

				btn.onclick = () => {
				  currentDistrict = districtIndex;
				  currentVillage = i;

				  updateChart();

				  // ปิด dropdown
				  container.classList.add("hidden");
				};

				container.appendChild(btn);
			  });
			}
		
			fetch("village_data.json")
			  .then(res => res.json())
			  .then(data => {
				villageData = data.districts;

				currentDistrict = 0;
				currentVillage = 0;

				// 🔥 เพิ่มตรงนี้
				renderDropdownVillages(0);
				renderDropdownVillages(1);
				renderDropdownVillages(2);

				updateChart();
			  })
			  .catch(err => {
				console.error("โหลด JSON ไม่ได้:", err);
			  });

		// 🔥 สร้างกราฟ
		const ctx = document.getElementById('weatherChart').getContext('2d');
		let weatherChart = new Chart(ctx, {
			type: 'line',
			data: {
				labels: [],
				datasets: [{
					label: '',
					data: [],
					borderColor: '#3b82f6',
					backgroundColor: 'rgba(59, 130, 246, 0.1)',
					fill: true,
					tension: 0.4,
					borderWidth: 4,
					pointRadius: 6,
					pointBackgroundColor: '#fff'
				}]
			},
			options: {
				responsive: true,
				maintainAspectRatio: false,
				plugins: { legend: { display: false } },
				scales: {
					y: { grid: { color: '#334155' }, ticks: { color: '#64748b' } },
					x: { grid: { display: false }, ticks: { color: '#64748b' } }
				}
			}
		});


		// 🔥 update chart
			function updateChart() {
				if (!villageData.length) return;

				const data = villageData[currentDistrict].villages[currentVillage];
				if (!data) return;

				// 🔹 update card (ทำทุกครั้ง ไม่ขึ้นกับกราฟ)
				const safe = (val) => (val !== undefined && val !== null) ? val : "--";

				document.getElementById('tempVal').innerText = safe(data.temp_hourly?.[0]);
				document.getElementById('humidVal').innerText = safe(data.humid_hourly?.[0]);
				document.getElementById('windVal').innerText = safe(data.wind_hourly?.[0]);
				document.getElementById('rainVal').innerText = safe(data.rain_hourly?.[0]);
				document.getElementById('cloudVal').innerText = safe(data.cloud_hourly?.[0]);
				document.getElementById('solarVal').innerText = safe(data.solar_hourly?.[0]);

				// 🔹 ชื่อ + location
				document.getElementById('currentVillageName').innerText = data.name;

				document.getElementById('locationText').innerText =
					`ตำบล${data.subdistrict} · อำเภอ${data.district} · จังหวัด${data.province}`;

				document.getElementById('coordText').innerText =
					`Lat: ${data.lat}°N | Lon: ${data.lon}°E`;

				// 🔹 เตรียม key
				const key = currentMetric + "_" + currentRange;
				let chartData = data[key];

				// 🔥 NO DATA (กระทบเฉพาะกราฟ)
				if (!chartData || chartData.length === 0) {

					weatherChart.data.labels = [];
					weatherChart.data.datasets[0].data = [];
					weatherChart.update();

					document.getElementById('chartTitle').innerText =
						"ไม่มีข้อมูล (No Data)";

					document.getElementById('chartTitle').classList.add("text-red-400");

					document.getElementById("timeBlocks").innerHTML =
						"<div class='col-span-full text-center text-slate-500'>No Data</div>";

					return;
				}

				// 🔹 มีข้อมูล → reset สี title
				document.getElementById('chartTitle').classList.remove("text-red-400");

				// 🔹 labels
				const labels = currentRange === "hourly"
				? getThaiTimeLabels()
				: getChartDateLabels();

				// 🔹 update chart
				weatherChart.data.labels = labels;
				weatherChart.data.datasets[0].data = chartData;
				weatherChart.data.datasets[0].label =
					metricLabel[currentMetric] + " (" + metricUnit[currentMetric] + ")";

				weatherChart.update();

				// 🔹 title
				document.getElementById('chartTitle').innerText =
					"แนวโน้ม" + metricLabel[currentMetric] +
					" " + rangeLabel[currentRange] +
					" (" + metricUnit[currentMetric] + ")";

				// 🔹 time blocks
				renderTimeBlocks(data);
			}
		
		function getThaiTimeLabels() {
				const now = new Date();

				const labels = [];

				for (let i = 0; i < 6; i++) {
					let d = new Date(now);
					d.setHours(6 + i * 3, 0, 0, 0);

					labels.push(
					d.toLocaleTimeString('th-TH', {
						hour: '2-digit',
						minute: '2-digit',
						timeZone: 'Asia/Bangkok'
					}) + " น."
				);
				}

				return labels;
			}
		
		function getChartDateLabels() {
			const now = new Date();

			let labels = [];

			for (let i = 0; i < 7; i++) {
				let d = new Date(now);
				d.setDate(now.getDate() + i);

				const date = d.toLocaleDateString('th-TH', {
					day: 'numeric',
					month: 'short',
					year: 'numeric'
				});

				labels.push(date);
			}

			return labels;
		}
		
		function getFullThaiDayLabels() {
			const daysFull = [
				'วันอาทิตย์',
				'วันจันทร์',
				'วันอังคาร',
				'วันพุธ',
				'วันพฤหัสบดี',
				'วันศุกร์',
				'วันเสาร์'
			];

			const now = new Date();

			let labels = [];

			for (let i = 0; i < 7; i++) {
				let d = new Date(now);
				d.setDate(now.getDate() + i);

				const day = daysFull[d.getDay()];

				const date = d.toLocaleDateString('th-TH', {
					day: 'numeric',
					month: 'short',
					year: 'numeric'
				});

				labels.push(`${day} ${date}`);
			}

			return labels;
		}
		
		function getCurrentHourIndex() {
			const now = new Date();
			const hour = now.getHours();

			const slots = [6, 9, 12, 15, 18, 21];

			let closestIndex = 0;
			let minDiff = 999;

			slots.forEach((h, i) => {
				const diff = Math.abs(hour - h);
				if (diff < minDiff) {
					minDiff = diff;
					closestIndex = i;
				}
			});

			return closestIndex;
		}
		
		function lerp(a, b, t) {
			return a + (b - a) * t;
		}

		function interpolateColor(c1, c2, t) {
			const r = Math.round(lerp(c1[0], c2[0], t));
			const g = Math.round(lerp(c1[1], c2[1], t));
			const b = Math.round(lerp(c1[2], c2[2], t));
			return `rgb(${r},${g},${b})`;
		}
		
		function getTempGradient(val, min, max) {
				if (val === undefined || val === null) return "rgb(30,41,59)";
	
				const t = Math.max(0, Math.min(1, (val - min) / (max - min || 1)));

				const stops = [
					{ t: 0.0, color: [0, 0, 130] },     // น้ำเงิน
					{ t: 0.25, color: [0, 180, 255] },  // ฟ้า
					{ t: 0.5, color: [0, 220, 100] },   // เขียว
					{ t: 0.7, color: [255, 220, 0] },   // เหลือง
					{ t: 0.85, color: [255, 120, 0] },  // ส้ม
					{ t: 1.0, color: [180, 0, 0] }      // แดง
				];

				for (let i = 0; i < stops.length - 1; i++) {
					const s1 = stops[i];
					const s2 = stops[i + 1];

					if (t >= s1.t && t <= s2.t) {
						const localT = (t - s1.t) / (s2.t - s1.t);
						const color = interpolateColor(s1.color, s2.color, localT);
						return color.replace("rgb", "rgba").replace(")", ", 0.65)");
					}
				}

				return "rgb(30,41,59)";
			}

		function renderTimeBlocks(data) {
			const container = document.getElementById("timeBlocks");
			container.innerHTML = "";

			const key = currentMetric + "_" + currentRange;
			const chartData = data[key];

			if (!chartData || chartData.length === 0) {
				container.innerHTML =
					"<div class='col-span-full text-center text-slate-500'>No Data</div>";
				return;
			}
			
			const dayColorMap = [
				"bg-yellow-400/20 border-yellow-400/40",  // จันทร์
				"bg-pink-400/20 border-pink-400/40",      // อังคาร
				"bg-green-400/20 border-green-400/40",    // พุธ
				"bg-orange-400/20 border-orange-400/40",  // พฤหัส
				"bg-sky-400/20 border-sky-400/40",        // ศุกร์
				"bg-purple-400/20 border-purple-400/40",  // เสาร์
				"bg-slate-400/20 border-slate-400/40"     // อาทิตย์ (เผื่อไว้)
			];
			
			const labels = currentRange === "hourly"
			? getThaiTimeLabels()
			: getFullThaiDayLabels();

			const minVal = Math.min(...chartData);
			const maxVal = Math.max(...chartData);

			chartData.forEach((val, i) => {

			const block = document.createElement("div");

			const isHourly = currentRange === "hourly";
			const isToday = i === 0;
			const currentHourIndex = getCurrentHourIndex();
			const isNow = isHourly && i === currentHourIndex;

			// 🎨 เลือกสี
			let baseColor;

			let bgColor = null;

			if (isHourly && currentMetric === "temp") {
				bgColor = getTempGradient(val, minVal, maxVal);
			} else if (currentRange === "daily") {
				baseColor = dayColorMap[i] || "bg-slate-800 border-slate-700";
			} else {
				baseColor = "bg-slate-800 border-slate-700";
			}

			// 🏷 label
			let labelText = labels[i];

			if (isNow) labelText = "ตอนนี้";
			else if (isToday && currentRange === "daily") labelText = "วันนี้";

			// 🎯 class
			block.className = `
				p-4 rounded-2xl border
				flex flex-col items-center justify-center text-center
				transition duration-300
				hover:scale-105
				${isNow ? "ring-2 ring-yellow-400 scale-110 shadow-lg shadow-yellow-500/30" : ""}
			`;
			if (bgColor) {
				block.style.background = bgColor;
				block.style.borderColor = bgColor;
				block.style.boxShadow = `0 0 10px ${bgColor}55`;
			} else if (currentRange === "daily") {
				block.classList.add(...(dayColorMap[i] || "").split(" "));
			} else {
				block.classList.add("bg-slate-800", "border-slate-700");
			}

			block.innerHTML = `
			<div class="text-xs text-slate-300 mb-1">
				${labelText}
			</div>

			<div class="text-2xl font-bold text-white">
				${val ?? "--"}
			</div>

			<div class="text-xs text-slate-400 mt-1">
				${metricUnit[currentMetric]}
			</div>
		`;

			container.appendChild(block);
		});
		}


		// 🔥 เปลี่ยนอำเภอ (สำคัญ)
		function updateDistrict(index) {
			currentDistrict = index;
			currentVillage = 0;
			updateChart();

			// highlight อำเภอ
			const buttons = document.querySelectorAll('#villageButtons button');
			buttons.forEach((btn, i) => {
				if(i === index) btn.classList.add('active-village');
				else btn.classList.remove('active-village');
			});
		}


		// ❌ ฟังก์ชันเดิมไม่ใช้แล้ว (แต่ไม่ลบก็ได้)
		function updateVillageData(index) {
			updateDistrict(index);
		}

		// 🔥 controls
	function setMetric(metric, el) {
		currentMetric = metric;

		document.querySelectorAll('.card-dark').forEach(c => {
			c.classList.remove('ring-2','ring-blue-500');
		});

		el.classList.add('ring-2','ring-blue-500');

		updateChart();
	}

		function setRange(range) {
			currentRange = range;

			// 🔥 reset ปุ่มทั้งหมด
			document.getElementById("btn-hourly").className =
				"px-3 py-1 bg-slate-700 rounded text-slate-300";

			document.getElementById("btn-daily").className =
				"px-3 py-1 bg-slate-700 rounded text-slate-300";

			// 🔥 active ปุ่มที่เลือก
			const activeBtn = document.getElementById(`btn-${range}`);

			activeBtn.className =
				"px-3 py-1 bg-blue-600 text-white rounded shadow-lg shadow-blue-500/30";

			updateChart();
		}

	</script>
</body>
</html>
